services:
  - type: web
    name: code-collab-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    env: node
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://code-collab-frontend.onrender.com

  - type: static_site
    name: code-collab-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://code-collab-backend.onrender.com